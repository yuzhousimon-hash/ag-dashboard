name: Weekly Policy Scan

on:
  schedule:
    # 每周五 18:45 北京时间 = 10:45 UTC
    - cron: '45 10 * * 5'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run policy scan
        env:
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
        run: python etl/auto_scanner.py

      - name: Run weekly report
        run: python weekly_runner.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: weekly policy scan $(date +%Y-%m-%d)"
          git push
